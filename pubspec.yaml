name: shesync
description: "A hormonal health & cycle tracking app 🌸"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.2    

  # 🌿 Local storage
  shared_preferences: ^2.2.3

  # 📊 Charts for insights
  fl_chart: ^0.68.0

  # ✨ Fonts
  google_fonts: ^6.2.1

  # 🍎 iOS style icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # 🌸 App Icon Generator
  flutter_launcher_icons: ^0.13.1
  google_generative_ai: ^0.4.6

# 🌸 ICON CONFIG (OUTSIDE dev_dependencies)
flutter_launcher_icons:
  android: true 
  ios: true
  image_path: "assets/icon.png"

  adaptive_icon_background: "#FFE4EC"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  

  assets:
    - assets/icon.png
    